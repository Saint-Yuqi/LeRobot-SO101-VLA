# Full training run for Eval 1 (color-conditioned banana → bowl).
# Run this AFTER overfit.yaml passes the trajectory-replay check on the real robot.

experiment_name: eval1_smolvla_v1
seed: 42

data:
  # Re-merge after every fresh recording session with:
  #   python scripts/merge_datasets.py --src data/raw/eval1_session* --dst data/raw/eval1_merged
  # Episode/frame counts are read from meta/info.json at runtime — no hardcoded sizes.
  repo_id: local/eval1_merged
  root: data/raw/eval1_merged
  episodes: null               # null = let the val splitter use all episodes
  image_keys: ["main"]
  # Color-stratified train/val split. Set exactly one of `per_color` (int)
  # or `fraction` (0..1). `min_train_per_color` aborts the split if any
  # color would drop below that many training episodes.
  val:
    fraction: 0.1
    min_train_per_color: 3
  augmentations:               # NOT yet wired through (see train.py warning).
    color_jitter: 0.2
    random_crop_pct: 0.95
    horizontal_flip: false

model:
  base: lerobot/smolvla_base
  chunk_size: 50
  freeze_vision_encoder: false
  freeze_lm_head: false

train:
  batch_size: 128              # bench job 2679976: 14.6 GB w/ compile — huge headroom
  grad_accum_steps: 1
  num_workers: 4
  num_steps: 20000
  lr: 5.0e-5
  weight_decay: 1.0e-5
  warmup_steps: 500
  log_every: 50
  save_every: 2000
  output_dir: checkpoints/eval1
  device: cuda
  precision: bf16
  compile: true                # bench job 2701026: +9% samples/s, -20% VRAM, ~5min cold start

# HF Hub push of the lowest-val (best) checkpoint. Default target is the
# team org `ethrl2026` private; teammates need `hf auth login` once with a
# token that has access to the org. Auth uses ~/.cache/huggingface/token
# inside the lerobot conda env.
hf:
  push: true
  repo_id: "ethrl2026/so101-eval1-smolvla-v1"
  private: true              # team org; flip explicitly when ready to publish

logging:
  use_wandb: true
  project: Lerobot
  entity: saint-yangyuqi-university-of-z-rich
  mode: online
  tags: [eval1, smolvla]
