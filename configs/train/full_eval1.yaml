# Full training run for Eval 1 (color-conditioned banana → bowl).
# Run this AFTER overfit.yaml passes.

experiment_name: eval1_smolvla_v1
seed: 42

data:
  repo_id: null
  root: data/processed/eval1_v1
  episodes: null               # null = use all episodes
  image_keys: ["front"]
  augmentations:
    color_jitter: 0.2          # robustness to lighting variation in HG
    random_crop_pct: 0.95
    horizontal_flip: false     # do NOT flip — left/right matters for color order

model:
  base: lerobot/smolvla_base
  chunk_size: 50
  freeze_vision_encoder: false
  freeze_lm_head: false

train:
  batch_size: 32
  grad_accum_steps: 2          # effective batch = 64 on a single A100 80GB
  num_steps: 30000
  lr: 5.0e-5
  weight_decay: 1.0e-5
  warmup_steps: 500
  log_every: 50
  eval_every: 1000             # run validation rollouts on a held-out split
  save_every: 2000
  output_dir: checkpoints/eval1
  device: cuda
  precision: bf16

  # early-stop if validation success rate plateaus
  early_stop_patience: 5

eval:
  prompts:
    - "Put the banana in the blue colored bowl."
    - "Put the banana in the red colored bowl."
    - "Put the banana in the green colored bowl."
  num_rollouts_per_prompt: 3

logging:
  use_wandb: true
  project: Lerobot
  entity: saint-yangyuqi-university-of-z-rich
  mode: online               # online | offline | disabled
  tags: [eval1, smolvla]
