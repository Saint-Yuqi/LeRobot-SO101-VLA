# Eval-1 fine-tune on the full task1 recording (90 episodes, fixed
# blue–red–green left→right arrangement, direct-color prompts).
# Differs from full_eval1.yaml only in data source + experiment name + HF push target;
# trainer code path is identical.

experiment_name: eval1_smolvla_v2
seed: 42

data:
  # 360 episodes — prompt + lighting augmentation pre-baked into the
  # parquet (4 augmented copies of the 90 original episodes). Pulled from
  # HuggingFace on first use; cached under HF_HOME.
  # NOTE: augmentation is in the data, so NO prompt_augment wrapper here.
  repo_id: ethrl2026/task1_20260509_prompt_lighting_augmented_360
  root: null
  episodes: null               # null = let the val splitter use all episodes
  image_keys: ["main"]
  val:
    fraction: 0.1              # ≈3 val eps per color, 27 train
    min_train_per_color: 3
  augmentations:               # NOT yet wired through (see train.py warning).
    color_jitter: 0.2
    random_crop_pct: 0.95
    horizontal_flip: false

model:
  base: lerobot/smolvla_base
  chunk_size: 50
  freeze_vision_encoder: false
  freeze_lm_head: false

train:
  batch_size: 128
  grad_accum_steps: 1
  num_workers: 4
  num_steps: 20000
  lr: 5.0e-5
  weight_decay: 1.0e-5
  warmup_steps: 500
  log_every: 50
  save_every: 2000           # disk-heavy ckpt cadence
  eval_every: 500            # cheap val pass; decoupled from ckpt save
  output_dir: checkpoints/eval1_v2
  device: cuda
  precision: bf16
  # Early stopping. Conservative — requires `patience` consecutive eval cycles
  # WITHOUT improvement of at least `min_delta`, AND step >= min_steps. The
  # lowest-val checkpoint is always saved to `<output_dir>/<run>/best/`.
  early_stop:
    enabled: true
    patience: 10             # 10×eval_every=5000 step plateau before stopping
    min_delta: 0.005         # ~3% of typical val/loss; below this is noise
    min_steps: 5000          # don't fire during early/transient phase

hf:
  push: true
  repo_id: "ethrl2026/so101-eval1-smolvla-v2"
  private: true              # team org; flip explicitly when ready to publish

logging:
  use_wandb: true
  project: Lerobot
  entity: saint-yangyuqi-university-of-z-rich
  mode: online
  tags: [eval1, smolvla, task1-full]
