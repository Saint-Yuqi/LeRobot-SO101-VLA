# Task 1: pi0 finetune — action expert only.
# PaliGemma VLM (vision + LM) is frozen; only the gemma_300m action expert
# and the action/state projection MLPs train.

experiment_name: pi0_task1_action_only
seed: 42

data:
  repo_id: ethrl2026/task1_20260509_prompt_lighting_augmented_360
  # Pre-downloaded locally; LeRobot reads parquet+videos from here.
  root: /home/ubuntu/datasets/ethrl2026/task1_20260509_prompt_lighting_augmented_360
  episodes: null               # null = let the val splitter use all episodes
  image_keys: ["main"]
  val:
    fraction: 0.1
    min_train_per_color: 3

model:
  family: pi0
  base: lerobot/pi0
  chunk_size: 50
  freeze_vision_encoder: true     # implied by train_expert_only, kept explicit
  train_expert_only: true         # freeze PaliGemma; train action expert + projections
  use_peft: false
  gradient_checkpointing: true    # pi0 is ~2.3B params — needed even at small batch

train:
  batch_size: 32
  grad_accum_steps: 4           # effective batch 128
  num_workers: 8
  num_steps: 20000
  lr: 5.0e-5                      # action-side only → can be larger than full-FT default
  weight_decay: 1.0e-5
  warmup_steps: 500
  log_every: 50
  save_every: 2000
  eval_every: 1000              # poll val more finely than save cadence
  early_stop:
    enabled: true
    patience: 5                 # 5 consecutive evals (≈5000 steps) without improvement
    min_delta: 0.002            # ignore sub-noise improvements when counting patience
    min_steps: 6000             # don't fire before warmup + early descent settle
  output_dir: checkpoints/pi0_task1
  device: cuda
  precision: bf16
  compile: false                  # leave off until baseline runs clean

hf:
  push: true
  repo_id: "ethrl2026/so101-pi0-task1"
  private: true

logging:
  use_wandb: true
  project: LeRobot-SO101-VLA
  entity: jiayisun02-eth-z-rich
  mode: online
  name: pi0_task1_action_only_v1
  tags: [pi0, task1, action_only, task1-prompt-lighting-aug]
