# Eval-2 fine-tune: 75 task2 episodes (5 bowl arrangements × 3 colors × 5
# eps) + 15 carry-over episodes from task1 (5 per color, picked
# deterministically with seed=42 from the 90-episode task1 set).
#
# Recorded prompts in tasks.parquet are direct color labels only. To cover
# eval-day compositional prompts (ordinal / relational / negation) we
# rewrite the `task` field at training time using each episode's bowl
# arrangement (configs/data/arrangements.json). The wrapper in
# src/data/prompt_aug.py samples uniformly from a 12–16 phrasing pool per
# (arrangement, target). Val sets are NOT augmented so eval loss stays
# comparable to the canonical recorded prompt.

experiment_name: eval2_smolvla_v1
seed: 42

data:
  sources:
    # Primary source — used for normalizer stats. 75 episodes, all 5
    # bowl arrangements. 10% color-stratified val split (canonical prompt).
    - repo_id: ethrl2026/so101_pickup_20260503_165245_task2
      root: null
      episodes: null
      val:
        fraction: 0.1
        min_train_per_color: 3
      prompt_augment:
        arrangements: configs/data/arrangements.json
    # Carry-over: 15 task1 episodes (5 per color, seed=42 deterministic
    # pick from the standard blue-red-green left→right arrangement). No
    # val split held out from this set — generalization aid, not eval target.
    - repo_id: ethrl2026/so101_pickup_20260503_153511_task1
      root: null
      episodes: [10, 14, 19, 22, 26, 41, 44, 45, 46, 53, 60, 73, 74, 81, 84]
      prompt_augment:
        arrangements: configs/data/arrangements.json
  image_keys: ["main"]

model:
  base: lerobot/smolvla_base
  chunk_size: 50
  freeze_vision_encoder: false
  freeze_lm_head: false

train:
  batch_size: 128
  grad_accum_steps: 1
  num_workers: 4
  num_steps: 25000             # +25% over eval1 — task2 is ~12k frames vs ~5.9k
  lr: 5.0e-5
  weight_decay: 1.0e-5
  warmup_steps: 750
  log_every: 50
  save_every: 2500
  output_dir: checkpoints/eval2_v1
  device: cuda
  precision: bf16

hf:
  push: true
  repo_id: "${HF_USER}/so101-eval2-smolvla-v1"
  private: false

logging:
  use_wandb: true
  project: Lerobot
  entity: saint-yangyuqi-university-of-z-rich
  mode: online
  tags: [eval2, smolvla, multi-source]
