# Eval-2 fine-tune: 2160 task2 episodes (stage-2 random lighting
# augmentation pre-baked into the parquet — covers all 5 bowl
# arrangements × 3 target colors with lighting + prompt variation).
# No carry-over from task1: the augmented dataset already provides enough
# coverage. No prompt_augment wrapper: augmentation is in the data.

experiment_name: eval2_smolvla_v1
seed: 42

data:
  # 90 task2 episodes × 24 augmented copies = 2160 frames-of-episodes.
  # Pulled from HuggingFace; cached under HF_HOME.
  repo_id: ethrl2026/task2_20260509_stage2_random_lighting_augmented_2160
  root: null
  episodes: null               # null = let the val splitter use all episodes
  image_keys: ["main"]
  val:
    fraction: 0.1
    min_train_per_color: 3

model:
  base: lerobot/smolvla_base
  chunk_size: 50
  freeze_vision_encoder: false
  freeze_lm_head: false

train:
  batch_size: 128
  grad_accum_steps: 1
  num_workers: 4
  num_steps: 25000             # augmented set is ~24× larger; let it see more steps
  lr: 5.0e-5
  weight_decay: 1.0e-5
  warmup_steps: 750
  log_every: 50
  save_every: 2500           # disk-heavy ckpt cadence (50 × 900MB if too small)
  eval_every: 500            # cheap val pass; decoupled from ckpt save
  output_dir: checkpoints/eval2_v1
  device: cuda
  precision: bf16
  # Early stopping. Same semantics as eval1; val/loss tracks fit on the
  # color-stratified held-out 10% of the augmented set.
  early_stop:
    enabled: true
    patience: 10             # 10×eval_every=5000 step plateau before stopping
    min_delta: 0.005
    min_steps: 5000

hf:
  push: true
  repo_id: "ethrl2026/so101-eval2-smolvla-v1"
  private: true              # team org; flip explicitly when ready to publish

logging:
  use_wandb: true
  project: Lerobot
  entity: saint-yangyuqi-university-of-z-rich
  mode: online
  tags: [eval2, smolvla, task2-augmented]
