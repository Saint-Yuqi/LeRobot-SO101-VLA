# Eval-3 fine-tune: task3 dataset, the third evaluation scenario.
# Single source, no carry-over, no PromptAugmentingDataset wrapper.
# (If the dataset itself has augmentation baked into the parquet, those
# variations are already part of `repo_id`; otherwise the policy sees the
# canonical recorded prompts.)
# Same shape as full_eval2.yaml minus carry-over and prompt-aug.

experiment_name: eval3_smolvla_v1
seed: 42

data:
  repo_id: ethrl2026/so101_pickup_20260509_185350_task3
  root: null
  episodes: null               # null = let the val splitter use all episodes
  image_keys: ["main"]
  val:
    fraction: 0.1
    min_train_per_color: 3

model:
  base: lerobot/smolvla_base
  chunk_size: 50
  freeze_vision_encoder: false
  freeze_lm_head: false

train:
  batch_size: 128
  grad_accum_steps: 1
  num_workers: 4
  num_steps: 20000             # match eval1; bump if val/loss is still trending
  lr: 5.0e-5
  weight_decay: 1.0e-5
  warmup_steps: 500
  log_every: 50
  save_every: 2000           # disk-heavy ckpt cadence
  eval_every: 500            # cheap val pass; decoupled from ckpt save
  output_dir: checkpoints/eval3_v1
  device: cuda
  precision: bf16
  # Early stopping. Same semantics as eval1.
  early_stop:
    enabled: true
    patience: 10             # 10×eval_every=5000 step plateau before stopping
    min_delta: 0.005
    min_steps: 5000

hf:
  push: true
  repo_id: "ethrl2026/so101-eval3-smolvla-v1"
  private: true              # team org; flip explicitly when ready to publish

logging:
  use_wandb: true
  project: Lerobot
  entity: saint-yangyuqi-university-of-z-rich
  mode: online
  tags: [eval3, smolvla, task3]
